<script>
    const LIFF_ID = "2010179102-Ba4IjCTo";

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        document.getElementById("name").textContent = "LIFF初期化OK";
        document.getElementById("message").textContent = "ログイン状態: " + liff.isLoggedIn();
        
        if (!liff.isLoggedIn()) {
          document.getElementById("message").textContent = "ログインしていません。タップしてログイン";
          document.querySelector(".card").onclick = () => liff.login();
        } else {
          const profile = await liff.getProfile();
          document.getElementById("name").textContent = "こんにちは、" + profile.displayName + "さん！";
          document.getElementById("avatar").src = profile.pictureUrl;
          document.getElementById("avatar").style.display = "block";
          document.getElementById("message").textContent = "LINEミニアプリへようこそ 🎉";
        }
      } catch(err) {
        document.getElementById("name").textContent = "エラー: " + err.message;
      }
    }

    init();
  </script>
