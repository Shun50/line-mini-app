<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コート予約</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; min-height: 100vh; }
    
    /* 各画面の共通スタイル */
    .screen { display: none; padding: 24px 16px; }
    .screen.active { display: block; }

    /* カード */
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    /* ヘッダー */
    .header { background: #06C755; color: white; padding: 16px; text-align: center; font-size: 18px; font-weight: bold; }

    /* プロフィール */
    .profile { display: flex; align-items: center; gap: 12px; }
    .profile img { width: 50px; height: 50px; border-radius: 50%; }
    .profile-name { font-size: 16px; font-weight: bold; }
    .profile-sub { font-size: 12px; color: #999; }

    /* ボタン */
    .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin-bottom: 12px; text-align: center; }
    .btn-green { background: #06C755; color: white; }
    .btn-gray { background: #eee; color: #333; }

    /* コート一覧 */
    .court-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
    .court-name { font-size: 16px; font-weight: bold; }
    .court-info { font-size: 12px; color: #999; margin-top: 4px; }
    .court-status { font-size: 12px; color: #06C755; font-weight: bold; }

    /* セクションタイトル */
    .section-title { font-size: 14px; color: #999; margin-bottom: 12px; }
    h2 { font-size: 18px; margin-bottom: 16px; }
  </style>
</head>
<body>

  <!-- ヘッダー（全画面共通） -->
  <div class="header">🏸 コート予約システム</div>

  <!-- 画面①：トップ画面 -->
  <div id="screen-top" class="screen active">
    <div class="card" style="margin-top:16px;">
      <div class="profile">
        <img id="avatar" src="https://via.placeholder.com/50" alt="アイコン">
        <div>
          <div class="profile-name" id="name">読み込み中...</div>
          <div class="profile-sub">会員番号：M-00123</div>
        </div>
      </div>
    </div>

    <div class="card">
      <p class="section-title">メニュー</p>
      <button class="btn btn-green" onclick="showScreen('screen-courts')">🎾 コートを予約する</button>
      <button class="btn btn-gray" onclick="alert('準備中です')">📋 予約履歴を見る</button>
      <button class="btn btn-gray" onclick="alert('準備中です')">👤 会員情報</button>
    </div>
  </div>

  <!-- 画面②：コート選択画面 -->
  <div id="screen-courts" class="screen">
    <div style="margin-top:16px;">
      <h2>コートを選んでください</h2>
      <p class="section-title">本日の空き状況</p>

      <div class="court-card" onclick="selectCourt('Aコート')">
        <div>
          <div class="court-name">🎾 Aコート</div>
          <div class="court-info">屋内 / 硬式対応</div>
        </div>
        <div class="court-status">空きあり</div>
      </div>

      <div class="court-card" onclick="selectCourt('Bコート')">
        <div>
          <div class="court-name">🎾 Bコート</div>
          <div class="court-info">屋内 / 軟式対応</div>
        </div>
        <div class="court-status">空きあり</div>
      </div>

      <div class="court-card" style="opacity:0.4;">
        <div>
          <div class="court-name">🎾 Cコート</div>
          <div class="court-info">屋外 / 硬式対応</div>
        </div>
        <div style="font-size:12px; color:#f00; font-weight:bold;">満席</div>
      </div>

      <button class="btn btn-gray" onclick="showScreen('screen-top')">← 戻る</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // LIFF初期化
    liff.init({ liffId: "2010179102-Ba4IjCTo" })
      .then(() => {
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          return liff.getProfile();
        }
      })
      .then(profile => {
        if (!profile) return;
        document.getElementById("name").textContent = profile.displayName;
        document.getElementById("avatar").src = profile.pictureUrl;
      })
      .catch(err => {
        document.getElementById("name").textContent = "エラー: " + err.message;
      });

    // 画面を切り替える関数
    // 全画面を隠してから、指定した画面だけ表示する
    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(screenId).classList.add("active");
    }

    // コートを選択したときの処理
    function selectCourt(courtName) {
      alert(courtName + "を選択しました！\n※次のステップで日時選択を実装します");
    }
    // 選択中のコート名を保存する変数
    let selectedCourt = "";
    let selectedDate = "";
    let selectedTime = "";

    // コートを選択したときの処理
    function selectCourt(courtName) {
      selectedCourt = courtName;
      
      // 日付ボタンを動的に生成する
      const dateContainer = document.getElementById("date-buttons");
      dateContainer.innerHTML = "";
      
      // 今日・明日・明後日の3日分を生成
      for (let i = 0; i < 3; i++) {
        const date = new Date();
        date.setDate(date.getDate() + i); // i日後の日付を計算
        
        const month = date.getMonth() + 1; // 月（0始まりなので+1）
        const day = date.getDate();
        const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
        const weekday = weekdays[date.getDay()];
        
        const label = i === 0 ? "今日" : i === 1 ? "明日" : "明後日";
        const dateStr = `${month}/${day}(${weekday})`;
        
        const btn = document.createElement("button");
        btn.className = "btn btn-gray";
        btn.textContent = `${label} ${dateStr}`;
        btn.onclick = () => selectDate(dateStr, btn);
        dateContainer.appendChild(btn);
      }

      // コート選択画面を隠して日時選択画面を表示
      showScreen("screen-datetime");
      document.getElementById("selected-court-name").textContent = selectedCourt;
    }

    // 日付を選択したときの処理
    function selectDate(dateStr, btnEl) {
      selectedDate = dateStr;
      // 全日付ボタンの色をリセット
      document.querySelectorAll("#date-buttons .btn").forEach(b => {
        b.classList.remove("btn-green");
        b.classList.add("btn-gray");
      });
      // 選択したボタンを緑色に
      btnEl.classList.remove("btn-gray");
      btnEl.classList.add("btn-green");
      
      // 時間帯を表示
      document.getElementById("time-section").style.display = "block";
    }

    // 時間帯を選択したときの処理
    function selectTime(time, btnEl) {
      selectedTime = time;
      // 全時間ボタンの色をリセット
      document.querySelectorAll("#time-buttons .time-btn").forEach(b => {
        b.style.background = "#eee";
        b.style.color = "#333";
      });
      // 選択したボタンを緑色に
      btnEl.style.background = "#06C755";
      btnEl.style.color = "white";
      
      // 予約ボタンを表示
      document.getElementById("confirm-btn").style.display = "block";
    }
    <!-- 画面③：日時選択画面 -->
  <div id="screen-datetime" class="screen">
    <div style="margin-top:16px;">
      <h2>日時を選んでください</h2>
      
      <div class="card">
        <p class="section-title">選択中のコート</p>
        <p style="font-weight:bold; font-size:16px;" id="selected-court-name"></p>
      </div>

      <div class="card">
        <p class="section-title">日付を選ぶ</p>
        <div id="date-buttons"></div>
      </div>

      <div class="card" id="time-section" style="display:none;">
        <p class="section-title">時間帯を選ぶ（1時間単位）</p>
        <div id="time-buttons" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('09:00', this)">09:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('10:00', this)">10:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('11:00', this)">11:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('12:00', this)">12:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('13:00', this)">13:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('14:00', this)">14:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('15:00', this)">15:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('16:00', this)">16:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('17:00', this)">17:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('18:00', this)">18:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('19:00', this)">19:00</button>
          <button class="time-btn" style="padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;" onclick="selectTime('20:00', this)">20:00</button>
        </div>
      </div>

      <button id="confirm-btn" class="btn btn-green" style="display:none;" onclick="showConfirm()">この内容で予約する →</button>
      <button class="btn btn-gray" onclick="showScreen('screen-courts')">← 戻る</button>
    </div>
  </div>
  </script>
</body>
</html>
