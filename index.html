<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>テスト</title>
</head>
<body>
  <h1>表示テスト成功！</h1>
  <p id="result">読み込み中...</p>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    liff.init({ liffId: "2010179102-Ba4IjCTo" })
      .then(() => {
        document.getElementById("result").textContent = 
          "LIFF OK / ログイン: " + liff.isLoggedIn();
      })
      .catch(e => {
        document.getElementById("result").textContent = "エラー: " + e.message;
      });
  </script>
</body>
</html>
